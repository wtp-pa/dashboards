name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs in favor of latest.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (for data tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run data accuracy tests
        run: python3 tests/run.py

      - name: Build Astro
        env:
          # Embedded into client-side JS at build time so the "Use my
          # location" lookup on /elected-officials can call OpenStates
          # /people.geo. Will be visible in the deployed source — same
          # key as the pipeline secret since OpenStates rate-limits per
          # key, not per environment.
          PUBLIC_OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
