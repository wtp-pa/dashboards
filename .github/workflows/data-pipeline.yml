name: Data Pipeline

on:
  schedule:
    # Weekly on Mondays at 06:00 UTC. Refreshes free, rate-limit-free sources
    # (IFO publications, OpenBookPA, Census). OpenStates-backed data (bills,
    # officials, votes) is refreshed monthly by data-pipeline-openstates.yml —
    # PA roll-call activity is bursty enough that weekly OpenStates polling
    # was overkill and chronically tripped 429s.
    - cron: "0 6 * * MON"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run IFO fetcher
        run: python pipeline/fetch_ifo.py

      - name: Run OpenBookPA fetcher
        run: python pipeline/fetch_openbookpa.py

      - name: Run Census fetcher
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python pipeline/fetch_census.py

      - name: Run data tests
        run: python3 tests/run.py
        continue-on-error: true  # surface issues without blocking the data commit

      - name: Commit updated data
        run: |
          git config user.name "wtp-budget-watch-bot"
          git config user.email "noreply@wtpppa.org"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: scheduled pipeline update (weekly)"
            git push
          fi
