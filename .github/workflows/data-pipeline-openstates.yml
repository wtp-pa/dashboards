name: Data Pipeline (OpenStates)

on:
  schedule:
    # Monthly on the 1st at 06:00 UTC. PA roll-call votes and bill activity
    # cluster around session days, not calendar weeks — monthly cadence
    # matches the actual rhythm and gives OpenStates' free-tier rate budget
    # plenty of headroom (weekly polling chronically 429'd, see commit log
    # 2026-05). Use `workflow_dispatch` to refresh on demand around major
    # floor action (budget season, end-of-session votes).
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch PA bills from OpenStates
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python pipeline/legislation/fetch_bills.py

      - name: Match bills against WTPPPA platform
        run: python pipeline/legislation/match_bills.py

      - name: Refresh PA legislator roster from OpenStates
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python pipeline/elected-officials/fetch_officials.py

      - name: Fetch PA roll-call votes from OpenStates
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python pipeline/elected-officials/fetch_votes.py

      - name: Score officials against platform
        run: python pipeline/elected-officials/score_officials.py

      - name: Run accuracy tests (data + integration)
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python3 tests/run.py --integration
        continue-on-error: true  # surface issues without blocking the data commit

      - name: Commit updated data
        run: |
          git config user.name "wtp-budget-watch-bot"
          git config user.email "noreply@wtpppa.org"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: scheduled pipeline update (monthly OpenStates)"
            git push
          fi
